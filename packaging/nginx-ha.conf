worker_processes 2;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # ── Upstream Load Balancing ──
    upstream backend_cluster {
        # Active-Active Load Balancing (Round Robin)
        # Assuming you have 2 app nodes
        server app-node-1:8000 max_fails=3 fail_timeout=30s;
        server app-node-2:8000 max_fails=3 fail_timeout=30s;
        
        # Add DR Node as Backup (Active-Passive)
        # server dr-node-1:8000 backup;
    }

    server {
        listen 80;
        listen 443 ssl http2;
        server_name patchmaster.corp.local;

        # SSL Configuration (Terminated at LB)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        
        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            # Proxy to Backend Cluster
            proxy_pass http://backend_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Health Check Settings
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }

        # Agent installer downloads
        location /download/ {
            alias /opt/patchmaster/backend/static/;
            try_files $uri =404;
        }

        # Shared Static Files (Mounted via NFS)
        location /static/ {
            alias /opt/patchmaster/backend/static/;
            expires 1y;
        }
    }
}
