services:
  # ── Load Balancer (Nginx) ──
  nginx-lb:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./packaging/nginx-ha.conf:/etc/nginx/nginx.conf:ro
      - ./packaging/certs:/etc/nginx/ssl:ro
    depends_on:
      - backend-node-1
      - backend-node-2
    networks:
      - ha-net

  # ── App Node 1 (Active) ──
  backend-node-1:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-patchmaster}:${POSTGRES_PASSWORD:-patchmaster}@db-primary:5432/${POSTGRES_DB:-patchmaster}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ID=backend-1
    volumes:
      - shared-static:/app/static
    networks:
      - ha-net

  # ── App Node 2 (Active) ──
  backend-node-2:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-patchmaster}:${POSTGRES_PASSWORD:-patchmaster}@db-primary:5432/${POSTGRES_DB:-patchmaster}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ID=backend-2
    volumes:
      - shared-static:/app/static
    networks:
      - ha-net

  # ── Database (Primary) ──
  db-primary:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-patchmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchmaster}
      POSTGRES_DB: ${POSTGRES_DB:-patchmaster}
    volumes:
      - pgdata-primary:/var/lib/postgresql/data
    networks:
      - ha-net

  # ── Database (Replica - Simulation) ──
  # In production, this would be a separate physical node
  # db-replica:
  #   image: postgres:15-alpine
  #   command: ["postgres", "-c", "hot_standby=on"]
  #   volumes:
  #      - pgdata-replica:/var/lib/postgresql/data

volumes:
  shared-static:  # This must be NFS mounted in prod
  pgdata-primary:

networks:
  ha-net:
    driver: bridge
