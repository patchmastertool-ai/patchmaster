{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h4 class="mb-0 fw-bold"><i class="bi bi-key-fill text-warning"></i> Change Password</h4>
    <small class="text-muted">Logged in as {{ session.get('user') }}</small>
  </div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card-dark p-4">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input type="password" name="current_password" class="form-control" required autocomplete="current-password">
        </div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control" required minlength="6" autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-control" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-warning w-100"><i class="bi bi-check-lg"></i> Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
