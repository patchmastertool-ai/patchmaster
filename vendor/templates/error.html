{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="topbar">
  <div>
    <h4 class="mb-0 fw-bold">{{ title }}</h4>
    <small class="text-muted">Vendor Management</small>
  </div>
  <a href="{{ url_for('dashboard') if session.get('logged_in') else url_for('login') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i> Back
  </a>
</div>

<div class="card-dark p-4">
  <div class="d-flex align-items-start gap-3">
    <div class="stat-icon" style="background:rgba(255,153,147,0.15);color:#ff9993">
      <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <div>
      <div class="badge bg-danger-subtle text-danger-emphasis mb-3">HTTP {{ status_code }}</div>
      <p class="mb-0 text-muted">{{ message }}</p>
    </div>
  </div>
</div>
{% endblock %}
