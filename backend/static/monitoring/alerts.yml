groups:
  - name: patchmaster-core
    rules:
      - alert: PatchMasterBackendDown
        expr: up{job="patchmaster-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PatchMaster backend is down"
          description: "Prometheus cannot scrape backend /metrics for 2 minutes."

      - alert: PatchMasterAgentMissing
        expr: sum(up{job="patchmaster-agents"} == bool 1) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No agents are reachable"
          description: "Prometheus has not scraped any PatchMaster agents for 5 minutes."

      - alert: PatchMasterHostCPUHigh
        expr: max by(instance) (system_cpu_usage_percent{job="patchmaster-agents"}) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU above 80%"
          description: "Host {{ $labels.instance }} CPU usage is {{ $value }}% for over 5 minutes."

      - alert: PatchMasterHostMemoryHigh
        expr: max by(instance) (system_memory_usage_percent{job="patchmaster-agents"}) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory above 80%"
          description: "Host {{ $labels.instance }} memory usage is {{ $value }}% for over 5 minutes."

      - alert: PatchMasterHostDiskIOHigh
        expr: max by(instance) (system_disk_read_bytes_per_sec{job="patchmaster-agents"} + system_disk_write_bytes_per_sec{job="patchmaster-agents"}) > 10485760
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk I/O high"
          description: "Host {{ $labels.instance }} disk throughput is above 10 MiB/s for over 5 minutes."

      - alert: PatchMasterRegisteredHostOffline
        expr: (patchmaster_hosts_total - patchmaster_hosts_online) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Registered host(s) offline"
          description: "{{ $value }} registered host(s) are currently offline."
