[pytest]
filterwarnings =
    ignore:'crypt' is deprecated.*:DeprecationWarning:passlib.utils
    ignore:Module already imported so cannot be rewritten; anyio:pytest.PytestAssertRewriteWarning
    ignore:The executor did not finishing joining its threads within 300 seconds\.:RuntimeWarning:asyncio.events
addopts = -p no:cacheprovider --ignore=backend/tests/test_master.py --ignore=backend/tests/test_testing_api.py --ignore=backend/tests/test_site_support.py --ignore=backend/tests/test_license_middleware.py --ignore=tests/test_agent_shutdown_queue.py