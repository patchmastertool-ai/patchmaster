services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-patchmaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patchmaster}
      POSTGRES_DB: ${POSTGRES_DB:-patchmaster}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patchmaster}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  backend:
    build: ./backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-patchmaster}:${POSTGRES_PASSWORD:-patchmaster}@db:5432/${POSTGRES_DB:-patchmaster}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-secure-random-string}
      - PM_SECRET_KEY=${PM_SECRET_KEY:-ZGV2LW9ubHktZmVybmV0LWtleS1kb25vdC11c2UtaW4tcHJvZA==}
      - LICENSE_SIGN_KEY=${LICENSE_SIGN_KEY:-dev-only-license-sign-key}
      - LOG_LEVEL=debug
      - PLAYWRIGHT_REAL_BASE_URL=${PLAYWRIGHT_REAL_BASE_URL:-http://127.0.0.1:${FRONTEND_PORT:-3000}}
      - PLAYWRIGHT_REAL_USER=${PLAYWRIGHT_REAL_USER:-admin}
      - PLAYWRIGHT_REAL_PASSWORD=${PLAYWRIGHT_REAL_PASSWORD:-}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - frontend

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Leave VITE_API_URL empty for dev — App.js auto-swaps port 3000→8000 on same host.
      # Set to e.g. http://192.168.1.10:8000 if backend is on a different host.
      - VITE_API_URL=${VITE_API_URL:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - frontend

  # ── Monitoring Stack ──
  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - backend
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-patchmaster}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/patchmaster-overview.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
  frontend:
    driver: bridge
